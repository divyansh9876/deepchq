services:
  deepchq:
    build:
      context: .
      dockerfile: Dockerfile
    image: deepchq:latest
    container_name: deepchq
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      HOSTNAME: 0.0.0.0
      PORT: 3000
      DATABASE_URL: file:/app/data/deepchq.json
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
      SERPER_API_KEY: ${SERPER_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      ALLOW_DEV_UNLOCK: ${ALLOW_DEV_UNLOCK:-false}
      STRIPE_PRICE_BASIC_WEEKLY: ${STRIPE_PRICE_BASIC_WEEKLY:-}
      STRIPE_PRICE_BASIC_QUARTERLY: ${STRIPE_PRICE_BASIC_QUARTERLY:-}
      STRIPE_PRICE_BASIC_YEARLY: ${STRIPE_PRICE_BASIC_YEARLY:-}
      STRIPE_PRICE_PRO_WEEKLY: ${STRIPE_PRICE_PRO_WEEKLY:-}
      STRIPE_PRICE_PRO_QUARTERLY: ${STRIPE_PRICE_PRO_QUARTERLY:-}
      STRIPE_PRICE_PRO_YEARLY: ${STRIPE_PRICE_PRO_YEARLY:-}
    volumes:
      - deepchq-data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 25s

volumes:
  deepchq-data:
